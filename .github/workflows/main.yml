name: Basic CI Pipeline


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files in repo
        run: ls -la

      - name: Display file content
        run: cat arun.txt

      - name: Success message
        run: echo "CI Pipeline executed successfully!"
